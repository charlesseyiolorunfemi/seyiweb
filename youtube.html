<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Youtube.come Clone</title>
    <style>
        .p1{
            width: 300px;
            height: 150px;
            object-fit: cover;
            object-position: 50% 35%;
            display: block;
        }
        .Search-bar{
            font-size: 15px;
            display: block;
        }
        .talking{
            width: 250px;
            font-family: Arial;
            font-weight: bold;
            font-size: 13px;
            display: inline-block;
        }
        .Jesus{
            width: 300px;
            display: inline-block;
            vertical-align: top;
            margin-right: 15px
        }
        .small{
            color: gray;
            font-family: Arial;
            font-size: 12px;
        }
        
        .dp{
            width: 50px;
            height: 50px;
            object-fit: cover;
            display: inline-block;
            border-radius: 30px;
            margin-top: 10px;
            
        }

        
    </style>
</head>
<body>
    <input class="Search-bar" type="text" placeholder="Search">
    <div class="Jesus">
        <img class="p1" src="pics/p1.jpg" alt="">
        
        <div style="
        display: grid;
        grid-template-columns: 50px 1fr;
        column-gap: 10px;
        
        ">
         <div>
            <img class="dp" src="pics/p3.jpg" alt="">
            </div> 

            <div>
       <p class="talking">Talking tech and Ai with Google CEO Sundar Pichar!</p>
       <p class="small">Marques Brownlee</p>
       <p class="small">3.4M views • 6 months ago</p>
      </div>

       </div>
    </div>
    <div class="Jesus">
          <img class="p1" src="pics/p2.jpg" alt="">

       <div style="
        display: grid;
        grid-template-columns: 50px 1fr;
        column-gap: 10px;
        ">
       <div>
          <img class="dp" src="pics/p4.jpg" alt="">
          </div>
        <div>
        <p class="talking">Try not to laugh challenge #9</p>
       <p class="small">Markiplier</p>
       <p class="small">19M views • 4 years ago</p>
       </div>
       
       
       
    </div>
</body>
</html>
