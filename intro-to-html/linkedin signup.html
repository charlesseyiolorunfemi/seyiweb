<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Linkedin clone</title>
    <style>
        p{
            font-family: Arial;
            margin: 0px;
        }
        .email{
            margin-bottom: 5px;
            font-size: 13px;
            color: gray;
        }
        .input{
            margin-bottom: 10px;
            border: 1.5px solid;
            border-radius: 4px;
            width: 235px;
        }
        .policy{
            color: gray;
            font-size: 10px;
        }
        button{
            color: white;
            background-color: blue;
            padding: 10px;
            margin-top: 10px;
            border: none;
            padding-left: 60px;
            padding-right: 60px;
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <p class="email">Email</p>
    <input class="input" type="text">
    <p class="policy">By clicking Agree & Join, you agree to the privacy policy</p>
    <button>Agree & Join</button>
</body>
</html>
