<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>uber request</title>
    <style>
        p{
            margin: 0px;
            font-family: Arial;
            font-size: 30px;
        }
        .destination,
        .location{
            border: 1px solid;
            padding: 5px;
            border-radius: 5px;
            display: block;
            margin-bottom: 5px;
            background-color:rgb(231, 230, 230);
            border: none;
            width: 300px;
        }
        .request{
            color: white;
            background-color: black;
            padding: 10px;
            border: none;
            margin-top: 18px;
            font-size: 10px;
            

        }
        .later{
            color: black;
            background-color: rgb(231, 230, 230);
            padding: 10px;
            border: none;
            margin-top: 18px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 10px;
            border-radius: 5px;

        }
    </style>
</head>
<body>
    <p>Request a ride now</p>
    <input class="location" type="text" placeholder="Enter pickup location">
    <input class="destination" type="text" placeholder="Enter Destination">
    <button class="request">Request now</button>
    <button class="later">Schedule for later</button>
</body>
</html>
