<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Twitter text box clone</title>
    <style>
        img{
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 25px;
            vertical-align: middle;
            margin-bottom: 0px;
        }
        img,
        p,
        button{
            display: inline-block
        }
        p{
            font-family: Arial;
            color: gray;
            margin-left: 5px;
            font-size: 15px;
        }
        button{
            color: white;
            font-family: Arial;
            background-color: rgb(0, 132, 255);
            border: none;
            padding-left: 10px;
            padding-top: 5px;
            padding-right: 10px;
            padding-bottom: 5px;
            border-radius: 15px;
            margin-left: 200px;
        }

    </style>
</head>
<body>
    <img src="../pics/p1.jpg" alt="">
    <p>What's happening?</p>
    <button>Tweet</button>
</body>
</html>
