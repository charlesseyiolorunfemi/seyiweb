<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweet 3</title>
    <style>
        img{
            height: 100px;
            width: 100px;
            object-fit: cover;
            margin: 0px;
        }
        p{
            font-family: Arial;
            margin: 0px;
        }
        button{
            color: white;
            background-color: rgb(82, 82, 248);
            border: none;
            padding: 5px;
            padding-left: 7px;
            padding-right: 7px;
            border-radius: 3px;
            margin-top: 5px;
            cursor: pointer;
        }
        .oliver{
            font-weight: bold;
            font-size: 15px;

        }
        .mutual2{
            color: gray;
            font-size: 13px;
            margin-top: 5px;
        }
        .box1{
            width: 100px;
            display: inline-block;
        }
        .box2{
            width: 100px;
            display: inline-block;
        }
        .box3{
            width: 100px;
            display: inline-block;
        }
        div{
            
            vertical-align: top;
            margin: 2px;
            padding: 5px;
            border-radius: 2px;
            box-shadow: 1px 1px 5px rgb(172, 171, 171);
        }
        .mimi{
             font-weight: bold;
            font-size: 15px;
        }
        .rex{
             font-weight: bold;
            font-size: 15px;
        }
        .mutual3{
            color: gray;
            font-size: 13px;
            margin-top: 5px;
        }
        .mutual4{
            color: gray;
            font-size: 13px;
            margin-top: 5px;
        }

    </style>
</head>
<body>
 
    
    
    <div class="box1">
          <img src="../pics/p1.jpg" alt="">
          <p class="oliver">Oliver</p>
          <p class="mutual2">2 mutual friends</p>
          <button class="add1">Add Friend</button>
    </div>
    <div class="box2">
        <img src="../pics/p2.jpg" alt="">
        <p class="mimi">Mimi</p>
        <p class="mutual3">3 mutual friends</p>
        <button class="add2">Add Friend</button>
    </div>
    <div class="box3">
       <img src="../pics/p3.jpg" alt="">
       <p class="rex">Rex</p>
       <p class="mutual4">4 mutual friends</p>
       <button class="add3">Add Friend</button>
    </div>
</body>
</html>
