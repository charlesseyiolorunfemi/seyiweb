<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>signuo form</title>
    <style>
        .name1,
        .name2{
            padding: 5px;
            border-radius: 8px;
            border: 1px solid;
            width: 100px;
            font-family: Arial;
            font-size: 13px;
            border-color: gray;
        }
        .email{
            padding: 5px;
            border-radius: 8px;
            border: 1px solid;
            width: 100px;
            font-family: Arial;
            font-size: 13px;
            display: block;
            margin-top: 10px;
            border-color: gray;
            width: 220px;
        }
        button{
            background-color: blue;
            color: white;
            border: none;
            padding-top: 5px;
            padding-bottom: 5px;
            padding-left: 90px;
            padding-right: 90px;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
            
        }
    </style>
</head>
<body>
  <input class="name1" type="text" placeholder="First name">  
  <input class="name2" type="text" placeholder="Second name">
  <input class="email" type="text" placeholder="Email">
  <button>Sign Up</button>
</body>
</html>
